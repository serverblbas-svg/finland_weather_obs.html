<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finland Weather - OBS Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 750px;
            height: 60px;
        }
        
        .weather-line {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            padding: 12px 16px;
            white-space: nowrap;
            direction: ltr;
            text-align: left;
            line-height: 36px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .weather-icon { margin-right: 6px; }
        
        .separator {
            margin: 0 12px;
            color: rgba(255,255,255,0.4);
        }
        
        .loading, .error {
            color: #ffffff;
            font-size: 18px;
            padding: 12px 16px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="weather-widget"><div class="loading">Loading...</div></div>

    <script>
        const LAT = 60.1699;
        const LON = 24.9384;
        
        const weatherCodes = {
            0: { text: 'Clear Sky', icon: '☀️' },
            1: { text: 'Mainly Clear', icon: '🌤️' },
            2: { text: 'Partly Cloudy', icon: '⛅' },
            3: { text: 'Overcast', icon: '☁️' },
            45: { text: 'Fog', icon: '🌫️' },
            48: { text: 'Depositing Rime Fog', icon: '🌫️' },
            51: { text: 'Light Drizzle', icon: '🌦️' },
            53: { text: 'Moderate Drizzle', icon: '🌦️' },
            55: { text: 'Dense Drizzle', icon: '🌧️' },
            56: { text: 'Light Freezing Drizzle', icon: '🌧️' },
            57: { text: 'Dense Freezing Drizzle', icon: '🌧️' },
            61: { text: 'Slight Rain', icon: '🌧️' },
            63: { text: 'Moderate Rain', icon: '🌧️' },
            65: { text: 'Heavy Rain', icon: '⛈️' },
            66: { text: 'Light Freezing Rain', icon: '🌨️' },
            67: { text: 'Heavy Freezing Rain', icon: '🌨️' },
            71: { text: 'Slight Snow', icon: '🌨️' },
            73: { text: 'Moderate Snow', icon: '❄️' },
            75: { text: 'Heavy Snow', icon: '❄️' },
            77: { text: 'Snow Grains', icon: '🌨️' },
            80: { text: 'Slight Showers', icon: '🌦️' },
            81: { text: 'Moderate Showers', icon: '🌧️' },
            82: { text: 'Violent Showers', icon: '⛈️' },
            85: { text: 'Slight Snow Showers', icon: '🌨️' },
            86: { text: 'Heavy Snow Showers', icon: '❄️' },
            95: { text: 'Thunderstorm', icon: '⛈️' },
            96: { text: 'Thunderstorm with Hail', icon: '⛈️' },
            99: { text: 'Thunderstorm with Heavy Hail', icon: '⛈️' }
        };
        
        function getWeatherInfo(code) {
            return weatherCodes[code] || { text: 'Unknown', icon: '🌡️' };
        }
        
        async function fetchWeather() {
            const widget = document.getElementById('weather-widget');
            
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe/Helsinki`
                );
                
                if (!response.ok) throw new Error('Error');
                
                const data = await response.json();
                const current = data.current;
                const info = getWeatherInfo(current.weather_code);
                
                widget.innerHTML = `
                    <div class="weather-line">
                        📍 Helsinki, Finland
                        <span class="separator">|</span>
                        🌡️ ${Math.round(current.temperature_2m)}°C
                        <span class="separator">|</span>
                        <span class="weather-icon">${info.icon}</span>${info.text}
                        <span class="separator">|</span>
                        💧 ${current.relative_humidity_2m}%
                        <span class="separator">|</span>
                        💨 ${current.wind_speed_10m} km/h
                    </div>
                `;
            } catch (err) {
                widget.innerHTML = `<div class="error">⚠️ Unable to fetch weather</div>`;
            }
        }
        
        fetchWeather();
        setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
