<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کەش و هەوای فینلاند - OBS Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 750px;
            height: 60px;
        }

        .weather-line {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            padding: 12px 16px;
            white-space: nowrap;
            direction: rtl;
            text-align: right;
            line-height: 36px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .weather-icon {
            margin-left: 6px;
        }

        .separator {
            margin: 0 12px;
            color: rgba(255,255,255,0.4);
        }

        .loading, .error {
            color: #ffffff;
            font-size: 18px;
            padding: 12px 16px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="weather-widget">
        <div class="loading">بارکردن...</div>
    </div>

    <script>
        // Helsinki, Finland
        const LAT = 60.1699;
        const LON = 24.9384;

        const weatherCodes = {
            0: { text: 'ئاسمان پاک', icon: '☀️' },
            1: { text: 'زۆرینە پاک', icon: '🌤️' },
            2: { text: 'هەور نیمچە', icon: '⛅' },
            3: { text: 'هەور', icon: '☁️' },
            45: { text: 'تەمە', icon: '🌫️' },
            48: { text: 'تەمە بە بەفر', icon: '🌫️' },
            51: { text: 'باران ساوا', icon: '🌦️' },
            53: { text: 'باران ساوا', icon: '🌦️' },
            55: { text: 'باران ساوا', icon: '🌧️' },
            56: { text: 'بارانی بەفری ساوا', icon: '🌧️' },
            57: { text: 'بارانی بەفری ساوا', icon: '🌧️' },
            61: { text: 'باران لاوەکی', icon: '🌧️' },
            63: { text: 'باران', icon: '🌧️' },
            65: { text: 'باران بەهێز', icon: '⛈️' },
            66: { text: 'بارانی بەفر', icon: '🌨️' },
            67: { text: 'بارانی بەفری بەهێز', icon: '🌨️' },
            71: { text: 'بەفری لاوەکی', icon: '🌨️' },
            73: { text: 'بەفر', icon: '❄️' },
            75: { text: 'بەفری بەهێز', icon: '❄️' },
            77: { text: 'بەفری تەڕ', icon: '🌨️' },
            80: { text: 'تەڕەباران', icon: '🌦️' },
            81: { text: 'تەڕەباران', icon: '🌧️' },
            82: { text: 'تەڕەبارانی بەهێز', icon: '⛈️' },
            85: { text: 'بەفرین', icon: '🌨️' },
            86: { text: 'بەفرینی بەهێز', icon: '❄️' },
            95: { text: 'ڕەعد و بروسکە', icon: '⛈️' },
            96: { text: 'ڕەعد و بروسکە بە تاشە بەفر', icon: '⛈️' },
            99: { text: 'ڕەعد و بروسکە بە تاشە بەفر', icon: '⛈️' }
        };

        function getWeatherInfo(code) {
            return weatherCodes[code] || { text: 'نەزانراو', icon: '🌡️' };
        }

        async function fetchWeather() {
            const widget = document.getElementById('weather-widget');

            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe/Helsinki`
                );

                if (!response.ok) throw new Error('هەڵە');

                const data = await response.json();
                const current = data.current;
                const info = getWeatherInfo(current.weather_code);

                widget.innerHTML = `
                    <div class="weather-line">
                        📍 هێلسینکی - فینلاند
                        <span class="separator">|</span>
                        🌡️ ${Math.round(current.temperature_2m)}°C
                        <span class="separator">|</span>
                        <span class="weather-icon">${info.icon}</span>${info.text}
                        <span class="separator">|</span>
                        💧 %${current.relative_humidity_2m}
                        <span class="separator">|</span>
                        💨 ${current.wind_speed_10m} km/h
                    </div>
                `;
            } catch (err) {
                widget.innerHTML = `<div class="error">⚠️ ناتوانرێت کەش و هەوا بهێنرێت</div>`;
            }
        }

        // یەکەم بارکردن
        fetchWeather();

        // نوێکردنەوەی خۆکار هەر 5 خولەکێک
        setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
