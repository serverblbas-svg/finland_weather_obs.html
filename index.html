<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finland, Helsinki Weather - OBS Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .weather-line {
            color: #ffffff;
            font-size: 16px; /* قەبارەی فۆنتەکە کەمێک بچووک کراوەتەوە بۆ ئەوەی بەیەکەوە جێگەیان ببێتەوە */
            font-weight: 800; 
            white-space: nowrap;
            direction: ltr;
            display: flex;
            align-items: center;
            gap: 8px; /* مەودای نێوان وشەکان کەم کراوەتەوە */
            padding-left: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.5);
        }

        .weather-item {
            display: inline-flex;
            align-items: center;
        }

        .weather-icon {
            margin-right: 3px;
        }

        .separator {
            color: rgba(255,255,255,0.4);
            font-weight: 800;
        }

        .loading, .error {
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 12px 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="weather-widget">
        <div class="loading">Loading weather data...</div>
    </div>

    <script>
        const LAT = 60.1699;
        const LON = 24.9384;

        const weatherCodes = {
            0: { text: 'Clear Sky', icon: '☀️' },
            1: { text: 'Mainly Clear', icon: '🌤️' },
            2: { text: 'Partly Cloudy', icon: '⛅' },
            3: { text: 'Cloudy', icon: '☁️' },
            45: { text: 'Foggy', icon: '🌫️' },
            48: { text: 'Depositing Rime Fog', icon: '🌫️' },
            51: { text: 'Light Drizzle', icon: '🌦️' },
            53: { text: 'Moderate Drizzle', icon: '🌦️' },
            55: { text: 'Dense Drizzle', icon: '🌧️' },
            56: { text: 'Light Freezing Drizzle', icon: '🌧️' },
            57: { text: 'Dense Freezing Drizzle', icon: '🌧️' },
            61: { text: 'Slight Rain', icon: '🌧️' },
            63: { text: 'Moderate Rain', icon: '🌧️' },
            65: { text: 'Heavy Rain', icon: '⛈️' },
            66: { text: 'Light Freezing Rain', icon: '🌨️' },
            67: { text: 'Heavy Freezing Rain', icon: '🌨️' },
            71: { text: 'Slight Snow Fall', icon: '🌨️' },
            73: { text: 'Moderate Snow Fall', icon: '❄️' },
            75: { text: 'Heavy Snow Fall', icon: '❄️' },
            77: { text: 'Snow Grains', icon: '🌨️' },
            80: { text: 'Slight Rain Showers', icon: '🌦️' },
            81: { text: 'Moderate Rain Showers', icon: '🌧️' },
            82: { text: 'Violent Rain Showers', icon: '⛈️' },
            85: { text: 'Slight Snow Showers', icon: '🌨️' },
            86: { text: 'Heavy Snow Showers', icon: '❄️' },
            95: { text: 'Thunderstorm', icon: '⛈️' },
            96: { text: 'Thunderstorm with Slight Hail', icon: '⛈️' },
            99: { text: 'Thunderstorm with Heavy Hail', icon: '⛈️' }
        };

        function getWeatherInfo(code) {
            return weatherCodes[code] || { text: 'Unknown', icon: '🌡️' };
        }

        async function fetchWeather() {
            const widget = document.getElementById('weather-widget');

            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe/Helsinki`
                );

                if (!response.ok) throw new Error('Error');

                const data = await response.json();
                const current = data.current;
                const info = getWeatherInfo(current.weather_code);

                widget.innerHTML = `
                    <div class="weather-line">
                        <span class="weather-item">📍 Finland, Helsinki</span>
                        <span class="separator">|</span>
                        <span class="weather-item">🌡️ ${Math.round(current.temperature_2m)}°C</span>
                        <span class="separator">|</span>
                        <span class="weather-item"><span class="weather-icon">${info.icon}</span>${info.text}</span>
                        <span class="separator">|</span>
                        <span class="weather-item">💧 Humidity: ${current.relative_humidity_2m}%</span>
                        <span class="separator">|</span>
                        <span class="weather-item">💨 Wind: ${current.wind_speed_10m} km/h</span>
                    </div>
                `;
            } catch (err) {
                widget.innerHTML = `<div class="error">⚠️ Unable to load weather data</div>`;
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
